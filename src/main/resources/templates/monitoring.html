<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Monitoring Sistem</h2>
    <a href="/dashboard" class="btn btn-secondary mb-3">
        Kembali
    </a>
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Jumlah Tanaman</h5>
                    <h2 th:text="${jumlahTanaman}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Jumlah Notifikasi</h5>
                    <h2 th:text="${jumlahNotifikasi}">0</h2>
                </div>
            </div>
        </div>
    </div>
    <div class="alert alert-success mt-4">
        Sistem Hydropedia Berjalan Normal
    </div>
</div>
</body>
</html>
