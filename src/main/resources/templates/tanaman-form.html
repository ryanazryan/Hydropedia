<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Tambah Tanaman</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">
        Tambah Tanaman
    </h2>

    <form action="/tanaman/simpan"
          method="post">

        <input
                name="namaTanaman"
                class="form-control mb-3"
                placeholder="Nama Tanaman">

        <input
                name="estimasiUmur"
                type="number"
                class="form-control mb-3"
                placeholder="Estimasi Umur">

        <input
                name="phIdealMin"
                type="number"
                step="0.1"
                class="form-control mb-3"
                placeholder="pH Minimum">

        <input
                name="phIdealMax"
                type="number"
                step="0.1"
                class="form-control mb-3"
                placeholder="pH Maximum">

        <input
                name="nutrisiIdeal"
                type="number"
                step="0.1"
                class="form-control mb-3"
                placeholder="Nutrisi Ideal">

        <select
                name="idJenis"
                class="form-select mb-4">

            <option
                    th:each="jenis : ${jenisList}"
                    th:value="${jenis.idJenis}"
                    th:text="${jenis.namaJenis}">
            </option>

        </select>

        <button
                class="btn btn-success">
            Simpan
        </button>

    </form>

</div>

</body>
</html>
