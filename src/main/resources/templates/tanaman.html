<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hydropedia - Daftar Tanaman</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <style>
            :root {
                --bg-color: #eef9f1;
                --logo-green: #158a4c;
                --border-green: #32d373;
                --text-dark: #283b4e;
                --text-gray: #829292;
                --card-bg: #ffffff;
            }

            * {
                font-family: 'Poppins', sans-serif;
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: var(--bg-color);
                color: var(--text-dark);
                overflow-x: hidden;
            }

            .wrapper {
                display: flex;
                min-height: 100vh;
            }

            @keyframes floatEffect {
                0% {
                    transform: translateY(0px);
                }
                50% {
                    transform: translateY(-5px);
                }
                100% {
                    transform: translateY(0px);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(25px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .sidebar {
                width: 270px;
                background: var(--card-bg);
                padding: 40px 25px;
                box-shadow: 2px 0 20px rgba(0,0,0,0.03);
                display: flex;
                flex-direction: column;
                z-index: 10;
            }

            .logo {
                font-size: 32px;
                font-weight: 700;
                color: var(--logo-green);
                margin-bottom: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
            }

            .logo i {
                animation: floatEffect 3s ease-in-out infinite;
            }

            .menu {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .menu a {
                color: var(--text-gray);
                text-decoration: none;
                padding: 14px 18px;
                border-radius: 14px;
                transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
                font-weight: 500;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .menu a:hover, .menu a.active {
                background: var(--bg-color);
                color: var(--logo-green);
                transform: translateX(5px);
            }

            /* KONTEN TANAMAN */
            .content {
                flex: 1;
                padding: 35px;
                overflow-x: hidden;
                animation: fadeInUp 0.6s ease-out;
            }

            .page-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 35px;
            }
            .page-header h1 {
                font-size: 32px;
                font-weight: 700;
                color: var(--logo-green);
                margin: 0;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .btn-add-plant {
                background: linear-gradient(135deg, var(--logo-green), var(--border-green));
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 14px;
                font-weight: 600;
                display: flex;
                align-items: center;
                gap: 10px;
                box-shadow: 0 8px 15px rgba(21, 138, 76, 0.15);
                transition: 0.3s;
                text-decoration: none;
            }
            .btn-add-plant:hover {
                transform: translateY(-3px);
                box-shadow: 0 12px 20px rgba(21, 138, 76, 0.25);
                color: white;
            }

            .plant-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
                gap: 25px;
            }
            .plant-card {
                background: var(--card-bg);
                border-radius: 22px;
                padding: 30px;
                box-shadow: 0 8px 15px rgba(0,0,0,.02);
                border-bottom: 5px solid var(--border-green);
                transition: 0.3s;
                position: relative;
                overflow: hidden;
            }
            .plant-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 25px rgba(21, 138, 76, 0.1);
            }
            .plant-icon-bg {
                position: absolute;
                right: -20px;
                bottom: -20px;
                font-size: 120px;
                color: rgba(50, 211, 115, 0.04);
                transform: rotate(-15deg);
                pointer-events: none;
            }

            .plant-title {
                font-size: 24px;
                font-weight: 700;
                color: var(--text-dark);
                margin-bottom: 5px;
            }
            .jenis-badge {
                background: #eaf8f0;
                color: var(--logo-green);
                padding: 6px 14px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                border: 1px solid rgba(50, 211, 115, 0.2);
            }

            .param-row {
                display: flex;
                gap: 15px;
                margin-top: 20px;
            }
            .param-box {
                flex: 1;
                background: var(--bg-color);
                padding: 12px 15px;
                border-radius: 14px;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .param-icon {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
            }
            .icon-ph-box {
                background: #fbf6e5;
                color: #eacb48;
            }
            .icon-nutrisi-box {
                background: #faede4;
                color: #e38b50;
            }
            .param-info {
                display: flex;
                flex-direction: column;
            }
            .param-label {
                font-size: 12px;
                color: var(--text-gray);
                font-weight: 500;
            }
            .param-value {
                font-size: 15px;
                font-weight: 700;
                color: var(--text-dark);
            }
            @media (max-width: 992px) {
                .plant-grid {
                    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                }
            }

            @media (max-width: 768px) {
                .wrapper {
                    flex-direction: column;
                }
                .sidebar {
                    width: 100%;
                    padding: 20px;
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                    flex-wrap: wrap;
                }
                .menu {
                    flex-direction: row;
                    width: 100%;
                    margin-top: 20px;
                    justify-content: space-between;
                    overflow-x: auto;
                }
                .content {
                    padding: 20px;
                }
                .page-header {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 15px;
                }
                .plant-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>

        <div class="wrapper">

            <div class="sidebar">
                <div class="logo">
                    <i class="fas fa-leaf"></i> Hydropedia
                </div>

                <div class="menu">
                    <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
                    <a href="/tanaman" class="active"><i class="fas fa-seedling"></i> Tanaman</a>
                    <a href="/monitoring"><i class="fas fa-desktop"></i> Monitoring</a>
                    <a href="/notifikasi"><i class="fas fa-bell"></i> Notifikasi</a>
                    <a href="/"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>

            <div class="content">
                <div class="page-header">
                    <h1><i class="fas fa-seedling"></i> Data Tanaman</h1>
                    <a href="/tanaman/tambah" class="btn-add-plant"><i class="fas fa-plus"></i> Tambah Tanaman</a>
                </div>

                <div class="plant-grid">
                    <div class="plant-card" th:each="t : ${tanamanList}">
                        <i class="fas fa-seedling plant-icon-bg"></i>

                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div class="plant-title" th:text="${t.namaTanaman}">Nama Tanaman</div>
                            <span class="jenis-badge" th:text="${t.jenisTanaman != null ? t.jenisTanaman.namaJenis : 'Tanaman'}">Jenis</span>
                        </div>

                        <div class="text-muted small fw-medium mb-3">
                            <i class="far fa-calendar-alt"></i> Panen dalam <span th:text="${t.estimasiUmur}"></span> Hari
                        </div>

                        <div class="param-row">
                            <div class="param-box">
                                <div class="param-icon icon-ph-box"><i class="fas fa-vial"></i></div>
                                <div class="param-info">
                                    <span class="param-label">Range pH</span>
                                    <span class="param-value" th:text="${t.phIdealMin} + ' - ' + ${t.phIdealMax}">5.5-6.5</span>
                                </div>
                            </div>

                            <div class="param-box">
                                <div class="param-icon icon-nutrisi-box"><i class="fas fa-bolt"></i></div>
                                <div class="param-info">
                                    <span class="param-label">Nutrisi</span>
                                    <span class="param-value" th:text="${t.nutrisiIdeal} + ' PPM'">850 PPM</span>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 pt-3 border-top d-flex gap-2">
                            <a th:href="@{/tanaman/edit/{id}(id=${t.idTanaman})}" class="btn btn-sm btn-outline-success rounded-pill px-3 fw-medium">
                                <i class="fas fa-edit"></i> Edit
                            </a>
                            <a th:href="@{/tanaman/delete/{id}(id=${t.idTanaman})}" class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-medium" onclick="return confirm('Yakin ingin menghapus tanaman ini?');">
                                <i class="fas fa-trash"></i> Hapus
                            </a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </body>
</html>
