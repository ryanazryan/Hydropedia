<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hydropedia - Data Tanaman</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
    --primary:#16a34a;
    --secondary:#22c55e;
    --light:#f0fdf4;
    --dark:#14532d;
    --gray:#64748b;
}

*{
    font-family:'Poppins',sans-serif;
}

body{
    margin:0;
    background:#f8fafc;
}

.wrapper{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{

    width:260px;

    background:white;

    border-right:1px solid #e2e8f0;

    padding:30px;
}

.logo{

    font-size:28px;
    font-weight:700;

    color:var(--primary);

    margin-bottom:40px;
}

.menu{

    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu a{

    text-decoration:none;

    color:#475569;

    padding:14px 18px;

    border-radius:12px;

    transition:.3s;
}

.menu a:hover,
.menu a.active{

    background:var(--light);

    color:var(--primary);
}

/* CONTENT */

.content{

    flex:1;

    padding:40px;
}

.topbar{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:30px;
}

.topbar h1{

    font-size:32px;
    font-weight:700;

    color:var(--dark);
}

.btn-add{

    background:var(--primary);

    color:white;

    text-decoration:none;

    padding:12px 22px;

    border-radius:12px;

    font-weight:600;
}

.btn-add:hover{

    background:#15803d;
    color:white;
}

.plant-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(320px,1fr));

    gap:25px;
}

.plant-card{

    background:white;

    border-radius:24px;

    padding:25px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);

    transition:.3s;
}

.plant-card:hover{

    transform:translateY(-6px);
}

.plant-header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:15px;
}

.plant-icon{

    width:55px;
    height:55px;

    border-radius:50%;

    background:var(--light);

    display:flex;
    align-items:center;
    justify-content:center;

    color:var(--primary);

    font-size:24px;
}

.badge-jenis{

    background:#dcfce7;

    color:#166534;

    padding:6px 14px;

    border-radius:50px;

    font-size:12px;

    font-weight:600;
}

.nama{

    font-size:22px;
    font-weight:700;

    color:#1e293b;
}

.detail{

    margin-top:20px;
}

.detail-row{

    display:flex;
    justify-content:space-between;

    padding:12px 0;

    border-bottom:
    1px solid #f1f5f9;
}

.label{

    color:#64748b;
}

.value{

    font-weight:600;
}

.card-footer{

    margin-top:20px;

    display:flex;
    justify-content:space-between;
}

.btn-action{

    border:none;

    padding:10px 15px;

    border-radius:10px;

    cursor:pointer;
}

.btn-edit{

    background:#fef3c7;

    color:#92400e;
}

.btn-delete{

    background:#fee2e2;

    color:#991b1b;
}

.empty{

    background:white;

    padding:40px;

    border-radius:20px;

    text-align:center;
}

</style>

</head>
<body>

<div class="wrapper">

    <div class="sidebar">

        <div class="logo">
            🌱 Hydropedia
        </div>

        <div class="menu">

            <a href="/dashboard">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </a>

            <a href="/tanaman" class="active">
                <i class="fa-solid fa-seedling"></i>
                Tanaman
            </a>

            <a href="/monitoring">
                <i class="fa-solid fa-desktop"></i>
                Monitoring
            </a>

            <a href="/notifikasi">
                <i class="fa-solid fa-bell"></i>
                Notifikasi
            </a>

            <a href="/">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>

        </div>

    </div>

    <div class="content">

        <div class="topbar">

            <h1>
                🌿 Data Tanaman
            </h1>

            <a href="/tanaman/tambah"
               class="btn-add">

                <i class="fa-solid fa-plus"></i>
                Tambah Tanaman

            </a>

        </div>

        <div th:if="${#lists.isEmpty(tanamanList)}"
             class="empty">

            <h3>Belum Ada Data Tanaman</h3>

            <p>
                Silahkan tambahkan tanaman terlebih dahulu.
            </p>

        </div>

        <div class="plant-grid">

            <div class="plant-card"
                 th:each="tanaman : ${tanamanList}">

                <div class="plant-header">

                    <div class="plant-icon">
                        <i class="fa-solid fa-leaf"></i>
                    </div>

                    <div class="badge-jenis"
                         th:text="${tanaman.jenisTanaman != null ? tanaman.jenisTanaman.namaJenis : 'Tidak Ada Jenis'}">

                        Jenis

                    </div>

                </div>

                <div class="nama"
                     th:text="${tanaman.namaTanaman}">
                </div>

                <div class="detail">

                    <div class="detail-row">

                        <span class="label">
                            Umur Panen
                        </span>

                        <span class="value"
                              th:text="${tanaman.estimasiUmur + ' Hari'}">
                        </span>

                    </div>

                    <div class="detail-row">

                        <span class="label">
                            pH Ideal
                        </span>

                        <span class="value"
                              th:text="${tanaman.phIdealMin + ' - ' + tanaman.phIdealMax}">
                        </span>

                    </div>

                    <div class="detail-row">

                        <span class="label">
                            Nutrisi
                        </span>

                        <span class="value"
                              th:text="${tanaman.nutrisiIdeal + ' ppm'}">
                        </span>

                    </div>

                </div>

                <div class="card-footer">

                    <button class="btn-action btn-edit">

                        <i class="fa-solid fa-pen"></i>

                    </button>

                    <button class="btn-action btn-delete">

                        <i class="fa-solid fa-trash"></i>

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
