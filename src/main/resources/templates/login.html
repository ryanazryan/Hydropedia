<!DOCTYPE html>
<html>
    <head>

        <meta charset="UTF-8">

        <title>Hydropedia Login</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        <style>

            *{
                font-family:'Poppins',sans-serif;
            }

            body{
                height:100vh;
                margin:0;

                display:flex;
            }

            .left{

                width:55%;

                background:
                    linear-gradient(
                    135deg,
                    #0F766E,
                    #14B8A6
                    );

                color:white;

                display:flex;
                justify-content:center;
                align-items:center;
            }

            .left-content{

                max-width:500px;
            }

            .left h1{

                font-size:64px;
                font-weight:700;
            }

            .right{

                width:45%;

                display:flex;
                justify-content:center;
                align-items:center;

                background:#f8fafc;
            }

            .login-card{

                width:420px;

                background:white;

                padding:40px;

                border-radius:24px;

                box-shadow:
                    0 15px 40px rgba(0,0,0,.08);
            }

        </style>

    </head>

    <body>

        <div class="left">

            <div class="left-content">

                <h1>Hydropedia</h1>

                <h4>
                    Smart Hydroponic Monitoring System
                </h4>

                <p>
                    Monitoring tanaman hidroponik berbasis IoT
                    dengan dashboard modern dan analitik real-time.
                </p>

            </div>

        </div>

        <div class="right">

            <div class="login-card">

                <h2 class="mb-4">
                    Welcome Back
                </h2>

                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>

                <form action="/login"
                      method="post">

                    <input
                        name="username"
                        class="form-control mb-3"
                        placeholder="Username">

                    <input
                        type="password"
                        name="password"
                        class="form-control mb-4"
                        placeholder="Password">

                    <button
                        class="btn btn-success w-100">
                        Login
                    </button>

                </form>

                <hr>

                <a href="/register"
                   class="btn btn-outline-success w-100">

                    Create Account

                </a>

            </div>

        </div>

    </body>
</html>
