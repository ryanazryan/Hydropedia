<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydropedia - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --logo-green: #158a4c;
            --border-green: #32d373;
        }
        * { font-family: 'Poppins', sans-serif; }
        body { height: 100vh; margin: 0; display: flex; }

        .left {
            width: 55%;
            background: linear-gradient(135deg, var(--logo-green), var(--border-green));
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .left-content { max-width: 500px; padding: 20px; text-align: center; }
        .logo-login { font-size: 50px; margin-bottom: 20px; }
        .left h1 { font-size: 64px; font-weight: 700; margin-bottom: 10px; }

        .right {
            width: 45%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
        }
        .login-card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,.08);
        }

        .btn-success { background-color: var(--logo-green) !important; border: none; }
        .btn-outline-success { color: var(--logo-green); border-color: var(--logo-green); }
        .btn-outline-success:hover { background-color: var(--logo-green); color: white; }
        
        /* Media Query untuk Responsif */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; min-height: 100vh; }
            .left { width: 100%; padding: 40px 20px; }
            .right { width: 100%; padding: 40px 20px; }
            .login-card { width: 100%; max-width: 400px; }
            .left h1 { font-size: 40px; }
            .logo-login { font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="left">
        <div class="left-content">
            <div class="logo-login"><i class="fas fa-leaf"></i></div>
            <h1>Hydropedia</h1>
            <h4>Smart Hydroponic Monitoring System</h4>
            <p>Monitoring tanaman hidroponik berbasis IoT dengan dashboard modern dan analitik real-time.</p>
        </div>
    </div>

    <div class="right">
        <div class="login-card">
            <h2 class="mb-4">Welcome Back</h2>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form action="/login" method="post">
                <input name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>
                <button class="btn btn-success w-100">Login</button>
            </form>

            <hr>
            <a href="/register" class="btn btn-outline-success w-100 text-decoration-none fw-bold">Create Account</a>
        </div>
    </div>

</body>
</html>
