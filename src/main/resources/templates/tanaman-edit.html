<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hydropedia - Edit Tanaman</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <style>
            :root {
                --bg-color: #eef9f1; 
                --logo-green: #158a4c; 
                --border-green: #32d373;
                --text-dark: #283b4e; 
                --text-gray: #829292; 
                --card-bg: #ffffff;
                
                /* Warna khusus Edit (Oranye) */
                --edit-color: #e67e22;
                --edit-hover: #d35400;
                --edit-light: rgba(230, 126, 34, 0.15);
            }

            * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }
            body { margin: 0; background: var(--bg-color); color: var(--text-dark); overflow-x: hidden; }
            .wrapper { display: flex; min-height: 100vh; }

            @keyframes floatEffect { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
            @keyframes fadeInUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

            /* SIDEBAR SAMA PERSIS */
            .sidebar { width: 270px; background: var(--card-bg); padding: 40px 25px; box-shadow: 2px 0 20px rgba(0,0,0,0.03); display: flex; flex-direction: column; z-index: 10; }
            .logo { font-size: 32px; font-weight: 700; color: var(--logo-green); margin-bottom: 50px; display: flex; align-items: center; justify-content: center; gap: 10px; }
            .logo i { animation: floatEffect 3s ease-in-out infinite; }
            .menu { display: flex; flex-direction: column; gap: 10px; }
            .menu a { color: var(--text-gray); text-decoration: none; padding: 14px 18px; border-radius: 14px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); font-weight: 500; display: flex; align-items: center; gap: 12px; }
            .menu a:hover, .menu a.active { background: var(--bg-color); color: var(--logo-green); transform: translateX(5px); }

            /* KONTEN FORM */
            .content { flex: 1; padding: 35px; overflow-x: hidden; animation: fadeInUp 0.6s ease-out; display: flex; flex-direction: column; }
            
            .form-wrapper { width: 100%; max-width: 800px; margin: 0 auto; }
            .form-card { background: var(--card-bg); border-radius: 20px; padding: 40px; box-shadow: 0 10px 25px rgba(21, 138, 76, 0.05); border-top: 6px solid var(--edit-color); } 
            .form-card h2 { color: var(--edit-color); font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
            
            .form-label { font-weight: 600; color: var(--text-dark); font-size: 14px; margin-bottom: 8px;}
            .form-control, .form-select { border-radius: 12px; padding: 12px 15px; border: 1px solid #e0e0e0; background: #f8fbf9; transition: all 0.3s; }
            .form-control:focus, .form-select:focus { border-color: var(--edit-color); box-shadow: 0 0 0 4px var(--edit-light); background: white; }

            .btn-simpan { background: var(--edit-color); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
            .btn-simpan:hover { background: var(--edit-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3); color: white;}
            .btn-batal { background: #f1f1f1; color: var(--text-gray); padding: 12px 30px; border-radius: 12px; font-weight: 600; text-decoration: none; transition: 0.3s; }
            .btn-batal:hover { background: #e2e2e2; color: var(--text-dark); }
        </style>
    </head>
    <body>

        <div class="wrapper">

            <div class="sidebar">
                <div class="logo">
                    <i class="fas fa-leaf"></i> Hydropedia
                </div>

                <div class="menu">
                    <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
                    <a href="/tanaman" class="active"><i class="fas fa-seedling"></i> Tanaman</a>
                    <a href="/monitoring"><i class="fas fa-desktop"></i> Monitoring</a>
                    <a href="/notifikasi"><i class="fas fa-bell"></i> Notifikasi</a>
                    <a href="/"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>

            <div class="content">
                <div class="form-wrapper">
                    <div class="form-card">
                        <h2><i class="fas fa-edit"></i> Edit Data Tanaman</h2>
                        
                        <form th:action="@{/tanaman/update/{id}(id=${tanaman.idTanaman})}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nama Tanaman</label>
                                    <input type="text" name="namaTanaman" class="form-control" th:value="${tanaman.namaTanaman}" required>
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Jenis Tanaman</label>
                                    <select name="idJenis" class="form-select" required>
                                        <option value="">-- Pilih Kategori --</option>
                                        <option th:each="jenis : ${jenisList}" 
                                                th:value="${jenis.idJenis}" 
                                                th:text="${jenis.namaJenis}"
                                                th:selected="${tanaman.jenisTanaman != null && tanaman.jenisTanaman.idJenis == jenis.idJenis}"></option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Estimasi Umur (Hari)</label>
                                    <input type="number" name="estimasiUmur" class="form-control" th:value="${tanaman.estimasiUmur}" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nutrisi Ideal (PPM)</label>
                                    <input type="number" step="0.1" name="nutrisiIdeal" class="form-control" th:value="${tanaman.nutrisiIdeal}" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Batas pH Minimum</label>
                                    <input type="number" step="0.1" name="phIdealMin" class="form-control" th:value="${tanaman.phIdealMin}" required>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label class="form-label">Batas pH Maximum</label>
                                    <input type="number" step="0.1" name="phIdealMax" class="form-control" th:value="${tanaman.phIdealMax}" required>
                                </div>
                            </div>

                            <div class="d-flex gap-3 mt-2 border-top pt-4">
                                <button type="submit" class="btn-simpan"><i class="fas fa-check-circle"></i> Update Tanaman</button>
                                <a href="/tanaman" class="btn-batal">Batal</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </body>
</html>
